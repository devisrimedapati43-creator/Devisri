<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Webpage</title>

    <style>
        /* CSS Styling */
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f7ff;
            text-align: center;
            padding: 40px;
        }

        h1 {
            color: darkblue;
        }

        p {
            color: #444;
            font-size: 18px;
        }

        img {
            width: 300px;
            border-radius: 10px;
            margin: 20px;
        }

        a {
            text-decoration: none;
            color: white;
            background-color: blue;
            padding: 10px 20px;
            border-radius: 5px;
        }

        a:hover {
            background-color: darkblue;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: green;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkgreen;
        }
    </style>
</head>

<body>

    <!-- HTML Elements -->
    <h1>Welcome to My Webpage</h1>

    <p>
        This is a simple webpage created using HTML, styled with CSS,
        and made interactive using JavaScript.
    </p>

    <img src="C:\Users\devis\OneDrive\Desktop\MCA\syllabus\SEM-2\MERN\image.png"
         alt="image.png">

    <br><br>

    <a href="https://www.google.com" target="_blank">
        Visit Google
    </a>

    <br>

    <!-- JavaScript Interaction -->
    <button onclick="showMessage()">
        Click Me
    </button>

    <script>
        function showMessage() {
            alert("Hello! You clicked the button.");
        }
    </script>

</body>
</html>
